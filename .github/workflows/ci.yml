name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install ruff
        run: pip install "ruff>=0.8.0"

      - name: Run ruff lint
        run: ruff check . --config ruff.toml

      - name: Run ruff format check
        run: ruff format --check . --config ruff.toml

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install "pytest>=8.0" "pytest-asyncio>=0.24" \
            "pytest-homeassistant-custom-component>=0.13.300" \
            "hassil==3.5.0" "home-assistant-intents==2026.1.28" \
            "PyTurboJPEG==1.8.0" "openai>=1.58.1" "voluptuous-openapi>=0.0.5"

      - name: Run tests
        run: pytest tests/ -v --tb=short

  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run hassfest validation
        uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run HACS validation
        uses: hacs/action@main
        with:
          category: integration
