remember:
  name: Remember
  description: >-
    Save a durable fact to the assistant's long-term memory. The fact is
    injected into future conversations with agents using the LiteLLM
    Extended Tools API.
  fields:
    text:
      name: Text
      description: The fact to remember (max 300 characters).
      required: true
      example: "Contractor quote for the shed: $10,196 (Old Hickory, July 2026)"
      selector:
        text:

forget:
  name: Forget
  description: >-
    Delete long-term memories whose text contains the given fragment
    (case-insensitive).
  fields:
    text:
      name: Text
      description: Fragment to match against stored memories.
      required: true
      example: "contractor quote"
      selector:
        text:

dream:
  name: Dream
  description: >-
    Run one memory-consolidation pass: analyze conversation transcripts since
    the last dream (plus optional household activity) and add/update/delete
    long-term memories. Call from an automation to schedule (e.g. nightly).
  fields:
    model:
      name: Model
      description: Model override for the dream call. Defaults to the AI Task subentry's model.
      required: false
      example: "bedrock-claude-4-5-haiku"
      selector:
        text:
    include_activity:
      name: Include activity
      description: Also analyze recent logbook activity (automations, presence, locks).
      required: false
      default: false
      selector:
        boolean:
    dry_run:
      name: Dry run
      description: Return proposed memory operations without applying them.
      required: false
      default: false
      selector:
        boolean:

clear_transcripts:
  name: Clear transcripts
  description: Wipe the conversation transcript buffer used by dreaming.

refresh_models:
  name: Refresh models
  description: >-
    Refetch the model list from your LiteLLM proxy and update the dream
    model dropdown (select.*_dream_model). Use this after adding a new
    model to your proxy — the dropdown is otherwise a snapshot taken when
    Home Assistant started.
